# docker-compose.yml
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: bildyapp
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/bildyapp
    depends_on:
      - mongo

volumes:
  mongo_data:
