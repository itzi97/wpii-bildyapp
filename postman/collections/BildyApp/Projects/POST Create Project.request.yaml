$kind: http-request
name: POST Create Project
method: POST
url: '{{baseUrl}}/api/project'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Project",
      "projectCode": "PROJ001",
      "client": "{{clientId}}"
    }
