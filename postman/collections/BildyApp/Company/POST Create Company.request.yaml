$kind: http-request
name: POST Create Company
method: POST
url: '{{baseUrl}}/api/user/company'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Bildy SL",
      "cif": "B12345678",
      "isFreelance": false,
      "address": "Calle Mayor 1, Madrid"
    }
