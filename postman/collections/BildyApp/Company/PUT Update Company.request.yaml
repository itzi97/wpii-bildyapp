$kind: http-request
name: PATCH Update Company
method: PATCH
url: '{{baseUrl}}/api/user/company'
order: 3000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "name": "Updated Company SL",
      "cif": "B12345678",
      "isFreelance": false,
      "address": {
        "street": "Calle Nueva",
        "number": "5",
        "postal": "28002",
        "city": "Madrid",
        "province": "Madrid"
      }
    }
