$kind: http-request
name: PATCH Create Company
method: PATCH
url: '{{baseUrl}}/api/user/company'
order: 1000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "name": "Test Company SL",
      "cif": "B12345678",
      "isFreelance": false,
      "address": {
        "street": "Calle Mayor",
        "number": "1",
        "postal": "28001",
        "city": "Madrid",
        "province": "Madrid"
      }
    }
