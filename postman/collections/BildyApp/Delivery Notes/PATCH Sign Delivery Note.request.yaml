$kind: http-request
name: PATCH Sign Delivery Note
method: PATCH
url: '{{baseUrl}}/api/deliverynote/{{deliveryNoteId}}/sign'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: formdata
  content:
    - key: signature
      type: file
      src: ''
