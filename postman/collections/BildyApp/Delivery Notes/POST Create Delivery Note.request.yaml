$kind: http-request
name: POST Create Delivery Note
method: POST
url: '{{baseUrl}}/api/deliverynote'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "clientId": "{{clientId}}",
      "projectId": "{{projectId}}",
      "description": "Test delivery note",
      "workDate": "2026-05-06",
      "format": "hours",
      "hours": 8
    }
