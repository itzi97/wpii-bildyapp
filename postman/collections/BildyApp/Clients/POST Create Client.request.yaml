$kind: http-request
name: POST Create Client
method: POST
url: '{{baseUrl}}/api/client'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Client Test",
      "cif": "B99999999",
      "email": "client@test.com",
      "phone": "600000000",
      "address": {
        "street": "Calle Test",
        "number": "1",
        "postal": "28001",
        "city": "Madrid",
        "province": "Madrid"
      }
    }
