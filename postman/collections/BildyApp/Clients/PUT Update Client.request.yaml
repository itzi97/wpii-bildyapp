$kind: http-request
name: PUT Update Client
method: PUT
url: '{{baseUrl}}/api/client/{{clientId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated Client"
    }
