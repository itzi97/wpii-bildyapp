$kind: http-request
name: PUT Update Me
method: PUT
url: '{{baseUrl}}/api/user/me'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Ana",
      "lastName": "García",
      "nif": "12345678A"
    }
