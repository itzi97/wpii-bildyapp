$kind: http-request
name: PUT Update Me
method: PUT
url: '{{baseUrl}}/api/user/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "name": "Test",
      "lastName": "User",
      "nif": "12345678A"
    }
