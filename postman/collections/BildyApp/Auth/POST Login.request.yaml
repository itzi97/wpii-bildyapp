$kind: http-request
name: POST Login
method: POST
url: '{{baseUrl}}/api/user/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@bildyapp.com",
      "password": "Password123!"
    }
scripts:
  post-response:
    type: text/javascript
    exec: |-
      const res = pm.response.json();
      if (res.accessToken) pm.collectionVariables.set("accessToken", res.accessToken);
      if (res.refreshToken) pm.collectionVariables.set("refreshToken", res.refreshToken);